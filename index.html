async function loadData(d){try{const v=localStorage.getItem(`sg:${d}`);return v?JSON.parse(v):null;}catch{return null;}}
async function saveData(d,v){try{localStorage.setItem(`sg:${d}`,JSON.stringify(v));}catch(e){console.error(e);}}
async function deleteData(d){try{localStorage.removeItem(`sg:${d}`);}catch(e){console.error(e);}}
function todayStr(){const d=new Date();return`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}`;}
function getDow(){return new Date().getDay();}
function curHour(){return new Date().getHours();}
function timeStr(ms){if(!ms)return"";const d=new Date(ms);return`${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}:${String(d.getSeconds()).padStart(2,"0")}`;}
function elapsedStr(startMs){const s=Math.floor((Date.now()-startMs)/1000);if(s<60)return`${s}秒`;const m=Math.floor(s/60);if(m<60)return`${m}分${s%60}秒`;return`${Math.floor(m/60)}時間${m%60}分`;}
function minToStr(m){if(m<60)return`${m}分`;return`${Math.floor(m/60)}時間${m%60}分`;}
function estEndTime(rem){const d=new Date(Date.now()+rem*60000);return`${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;}
function genTasks(dow){return REPEAT_TASKS.filter(t=>t.days.includes(dow)).map(t=>({id:`${todayStr()}_${t.id}`,repeatId:t.id,title:t.title,block:t.block,cat:t.cat,est:t.est,done:false,startTime:null,endTime:null,skipped:false}));}
function requestNotif(){if("Notification"in window&&Notification.permission==="default")Notification.requestPermission();}
function sendNotif(t,b){if("Notification"in window&&Notification.permission==="granted"){try{new Notification(t,{body:b});}catch(e){}}}

function App(){
  const [tasks,setTasks]=useState([]);
  const [activeId,setActiveId]=useState(null);
  const [loaded,setLoaded]=useState(false);
  const [now,setNow]=useState(new Date());
  const [selBlock,setSelBlock]=useState(null);
  const [adding,setAdding]=useState(false);
  const [newTitle,setNewTitle]=useState("");
  const [newEst,setNewEst]=useState(5);
  const [popup,setPopup]=useState(null);
  const [confirmReset,setConfirmReset]=useState(false);
  const timersRef=useRef({});
  const dateStr=todayStr();
  const dow=getDow();
  const DOW=["日","月","火","水","木","金","土"];

  useEffect(()=>{const t=setInterval(()=>setNow(new Date()),1000);return()=>clearInterval(t);},[]);
  useEffect(()=>{
    requestNotif();
    (async()=>{
      const saved=await loadData(dateStr);
      if(saved&&saved.tasks){setTasks(saved.tasks);setActiveId(saved.activeId||null);}
      else setTasks(genTasks(dow));
      setLoaded(true);
    })();
  },[]);
  useEffect(()=>{if(!loaded)return;const h=curHour();const cur=BLOCKS.find(b=>h>=b.start&&h<b.end);if(cur&&!selBlock)setSelBlock(cur.id);},[loaded]);
  useEffect(()=>{if(!loaded)return;saveData(dateStr,{tasks,activeId});},[tasks,activeId,loaded]);

  async function resetToday(){
    await deleteData(dateStr);
    Object.values(timersRef.current).forEach(t=>clearTimeout(t));
    timersRef.current={};
    setActiveId(null);
    setPopup(null);
    setTasks(genTasks(dow));
    setConfirmReset(false);
  }

  function scheduleTimer(taskId,title,estMin){
    if(timersRef.current[taskId])clearTimeout(timersRef.current[taskId]);
    timersRef.current[taskId]=setTimeout(()=>{setPopup({taskId,title});sendNotif("しゃにがま",`「${title}」は完了しましたか？`);},estMin*60*1000);
  }
  function clearTimer(taskId){if(timersRef.current[taskId]){clearTimeout(timersRef.current[taskId]);delete timersRef.current[taskId];}}
  function startTask(taskId){
    const n=Date.now();const task=tasks.find(t=>t.id===taskId);
    if(activeId&&activeId!==taskId){clearTimer(activeId);setTasks(prev=>prev.map(t=>t.id===activeId?{...t,done:true,endTime:n}:t));}
    setTasks(prev=>prev.map(t=>t.id===taskId?{...t,startTime:n,endTime:null,done:false}:t));
    setActiveId(taskId);
    if(task)scheduleTimer(taskId,task.title,task.est);
  }
  function completeTask(taskId){
    const n=Date.now();clearTimer(taskId);
    setTasks(prev=>prev.map(t=>t.id===taskId?{...t,done:true,endTime:t.endTime||n}:t));
    if(activeId===taskId)setActiveId(null);
    if(popup&&popup.taskId===taskId)setPopup(null);
  }
  function skipTask(taskId){
    clearTimer(taskId);
    setTasks(prev=>prev.map(t=>t.id===taskId?{...t,skipped:true,done:true}:t));
    if(activeId===taskId)setActiveId(null);
    if(popup&&popup.taskId===taskId)setPopup(null);
  }
  function undoTask(taskId){clearTimer(taskId);setTasks(prev=>prev.map(t=>t.id===taskId?{...t,done:false,skipped:false,startTime:null,endTime:null}:t));}
  function addTask(){
    if(!newTitle.trim()||!selBlock)return;
    setTasks(prev=>[...prev,{id:`${dateStr}_c_${Date.now()}`,repeatId:null,title:newTitle.trim(),block:selBlock,cat:"その他",est:newEst,done:false,startTime:null,endTime:null,skipped:false}]);
    setNewTitle("");setNewEst(5);setAdding(false);
  }

  const remainMin=tasks.filter(t=>!t.done&&!t.skipped).reduce((s,t)=>s+t.est,0);
  const blockRemainMin=bid=>tasks.filter(t=>t.block===bid&&!t.done&&!t.skipped).reduce((s,t)=>s+t.est,0);
  const blockTasks=bid=>tasks.filter(t=>t.block===bid&&!t.skipped);
  const doneCount=tasks.filter(t=>t.done&&!t.skipped).length;
  const totalCount=tasks.filter(t=>!t.skipped).length;
  const progress=totalCount>0?Math.round(doneCount/totalCount*100):0;
  const activeTask=tasks.find(t=>t.id===activeId);
  const h=now.getHours();
  const curBlock=BLOCKS.find(b=>h>=b.start&&h<b.end);
  const circ=2*Math.PI*24;

  if(!loaded)return React.createElement("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",height:200,color:"var(--color-text-secondary)",fontSize:14}},"起動中...");

  return React.createElement("div",{style:{background:"var(--color-background-tertiary)",minHeight:400,fontFamily:"'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif",color:"var(--color-text-primary)"}},
    popup&&React.createElement("div",{style:{position:"sticky",top:0,zIndex:200,background:"#7c3aed",padding:"10px 16px",display:"flex",alignItems:"center",gap:10}},
      React.createElement("div",{style:{flex:1,fontSize:13,color:"#fff",fontWeight:500}},`「${popup.title}」は完了しましたか？`),
      React.createElement("button",{onClick:()=>completeTask(popup.taskId),style:{background:"#fff",color:"#7c3aed",border:"none",borderRadius:6,padding:"4px 12px",fontSize:12,fontWeight:700,cursor:"pointer",marginRight:6}},"完了"),
      React.createElement("button",{onClick:()=>setPopup(null),style:{background:"transparent",color:"#ddd",border:"1px solid #aaa",borderRadius:6,padding:"4px 10px",fontSize:12,cursor:"pointer"}},"後で")
    ),
    // ヘッダー
    React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 16px 10px",borderBottom:"0.5px solid var(--color-border-tertiary)",background:"var(--color-background-primary)",position:"sticky",top:popup?42:0,zIndex:100}},
      React.createElement("div",null,
        React.createElement("div",{style:{display:"flex",alignItems:"center",gap:10}},
          React.createElement("div",{style:{fontSize:20,fontWeight:500,color:"var(--color-text-info)",letterSpacing:"0.04em"}},"しゃにがま"),
          React.createElement("button",{
            onClick:()=>setConfirmReset(true),
            style:{background:"transparent",border:"0.5px solid var(--color-border-tertiary)",color:"var(--color-text-tertiary)",borderRadius:6,padding:"2px 8px",fontSize:10,cursor:"pointer"}
          },"リセット")
        ),
        React.createElement("div",{style:{fontSize:11,color:"var(--color-text-tertiary)",marginTop:2}},
          `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()}（${DOW[dow]}）　${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}:${String(now.getSeconds()).padStart(2,"0")}`)
      ),
      React.createElement("div",{style:{display:"flex",alignItems:"center",gap:10}},
        remainMin>0
          ?React.createElement("div",{style:{textAlign:"right"}},
            React.createElement("div",{style:{fontSize:12,fontWeight:500,color:"var(--color-text-primary)"}},`残 ${minToStr(remainMin)}`),
            React.createElement("div",{style:{fontSize:11,color:"var(--color-text-tertiary)",marginTop:1}},`→ ${estEndTime(remainMin)} 終了予定`)
          )
          :React.createElement("div",{style:{fontSize:12,color:"#34d399",fontWeight:500}},"全完了！"),
        React.createElement("svg",{width:52,height:52,viewBox:"0 0 56 56"},
          React.createElement("circle",{cx:28,cy:28,r:24,fill:"none",stroke:"var(--color-border-tertiary)",strokeWidth:4}),
          React.createElement("circle",{cx:28,cy:28,r:24,fill:"none",stroke:"#38bdf8",strokeWidth:4,strokeDasharray:circ,strokeDashoffset:circ*(1-progress/100),strokeLinecap:"round",transform:"rotate(-90 28 28)",style:{transition:"stroke-dashoffset 0.5s"}}),
          React.createElement("text",{x:28,y:33,textAnchor:"middle",fill:"var(--color-text-primary)",fontSize:13,fontWeight:500},`${progress}%`)
        )
      )
    ),
    // リセット確認
    confirmReset&&React.createElement("div",{style:{background:"var(--color-background-warning)",borderBottom:"0.5px solid var(--color-border-warning)",padding:"10px 16px",display:"flex",alignItems:"center",gap:10}},
      React.createElement("div",{style:{flex:1,fontSize:13,color:"var(--color-text-warning)"},"fontWeight":500},"今日のデータをリセットしますか？（完了済みも含めて全て初期化されます）"),
      React.createElement("button",{onClick:resetToday,style:{background:"var(--color-text-warning)",color:"#fff",border:"none",borderRadius:6,padding:"4px 12px",fontSize:12,fontWeight:700,cursor:"pointer",marginRight:6}},"リセット"),
      React.createElement("button",{onClick:()=>setConfirmReset(false),style:{background:"transparent",color:"var(--color-text-tertiary)",border:"0.5px solid var(--color-border-tertiary)",borderRadius:6,padding:"4px 10px",fontSize:12,cursor:"pointer"}},"キャンセル")
    ),
    // アクティブバー
    activeTask&&React.createElement("div",{style:{display:"flex",alignItems:"center",gap:12,background:"var(--color-background-info)",padding:"10px 16px",borderBottom:"0.5px solid var(--color-border-info)"}},
      React.createElement("div",{style:{fontSize:12,color:"var(--color-text-info)"}},"▶"),
      React.createElement("div",{style:{flex:1}},
        React.createElement("div",{style:{fontSize:13,fontWeight:500,color:"var(--color-text-info)"}},activeTask.title),
        React.createElement("div",{style:{fontSize:11,color:"var(--color-text-secondary)",marginTop:2}},`${timeStr(activeTask.startTime)} 〜 ${elapsedStr(activeTask.startTime)} 経過　見積${activeTask.est}分`)
      ),
      React.createElement("button",{onClick:()=>completeTask(activeTask.id),style:{background:"var(--color-text-info)",color:"var(--color-background-primary)",border:"none",borderRadius:6,padding:"4px 12px",fontSize:12,fontWeight:500,cursor:"pointer"}},"完了")
    ),
    // ブロックナビ
    React.createElement("div",{style:{display:"flex",overflowX:"auto",gap:4,padding:"8px 12px",borderBottom:"0.5px solid var(--color-border-tertiary)",scrollbarWidth:"none"}},
      BLOCKS.map(b=>{
        const bt=blockTasks(b.id);
        const bd=bt.filter(t=>t.done).length;
        const bRem=blockRemainMin(b.id);
        const isCur=curBlock?.id===b.id;
        const isSel=selBlock===b.id;
        return React.createElement("button",{key:b.id,onClick:()=>setSelBlock(b.id),style:{flexShrink:0,background:isSel?"var(--color-background-info)":"var(--color-background-secondary)",border:`0.5px solid ${isCur?"#fbbf24":isSel?"var(--color-border-info)":"var(--color-border-tertiary)"}`,borderRadius:8,padding:"6px 8px",cursor:"pointer",textAlign:"center",minWidth:58}},
          React.createElement("div",{style:{fontSize:10,color:isSel?"var(--color-text-info)":"var(--color-text-secondary)"}},b.label),
          React.createElement("div",{style:{fontSize:12,fontWeight:500,color:"var(--color-text-primary)",marginTop:2}},`${bd}/${bt.length}`),
          bRem>0&&React.createElement("div",{style:{fontSize:10,color:"var(--color-text-tertiary)",marginTop:1}},`残${bRem}分`)
        );
      })
    ),
    // ブロック詳細
    selBlock&&(()=>{
      const block=BLOCKS.find(b=>b.id===selBlock);
      const bt=blockTasks(selBlock);
      const sk=tasks.filter(t=>t.block===selBlock&&t.skipped);
      return React.createElement("div",{style:{padding:"0 12px 20px"}},
        React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 4px 8px"}},
          React.createElement("div",null,
            React.createElement("div",{style:{fontSize:15,fontWeight:500}},`${block.label}　${block.title}`),
            React.createElement("div",{style:{fontSize:11,color:"var(--color-text-tertiary)",marginTop:2}},`${bt.filter(t=>t.done).length}/${bt.length} 完了`)
          ),
          React.createElement("button",{onClick:()=>setAdding(true),style:{background:"transparent",border:"0.5px solid var(--color-border-secondary)",color:"var(--color-text-secondary)",borderRadius:6,padding:"5px 10px",fontSize:11,cursor:"pointer"}},"+　追加")
        ),
        adding&&React.createElement("div",{style:{background:"var(--color-background-secondary)",borderRadius:8,padding:12,marginBottom:8,border:"0.5px solid var(--color-border-tertiary)"}},
          React.createElement("input",{style:{width:"100%",background:"var(--color-background-primary)",border:"0.5px solid var(--color-border-secondary)",color:"var(--color-text-primary)",borderRadius:6,padding:"6px 10px",fontSize:13,outline:"none",boxSizing:"border-box",marginBottom:8},placeholder:"タスク名",value:newTitle,onChange:e=>setNewTitle(e.target.value),onKeyDown:e=>e.key==="Enter"&&addTask(),autoFocus:true}),
          React.createElement("div",{style:{display:"flex",gap:8,alignItems:"center"}},
            React.createElement("input",{type:"number",min:1,max:180,value:newEst,style:{width:60,background:"var(--color-background-primary)",border:"0.5px solid var(--color-border-secondary)",color:"var(--color-text-primary)",borderRadius:6,padding:"4px 8px",fontSize:13,outline:"none"},onChange:e=>setNewEst(Number(e.target.value))}),
            React.createElement("span",{style:{fontSize:12,color:"var(--color-text-secondary)"}},"分"),
            React.createElement("button",{onClick:addTask,style:{background:"var(--color-text-info)",color:"var(--color-background-primary)",border:"none",borderRadius:6,padding:"4px 14px",fontSize:12,fontWeight:500,cursor:"pointer"}},"追加"),
            React.createElement("button",{onClick:()=>setAdding(false),style:{background:"transparent",color:"var(--color-text-tertiary)",border:"0.5px solid var(--color-border-tertiary)",borderRadius:6,padding:"4px 10px",fontSize:12,cursor:"pointer"}},"キャンセル")
          )
        ),
        bt.length===0&&React.createElement("div",{style:{color:"var(--color-text-tertiary)",fontSize:13,textAlign:"center",padding:"24px 0"}},"今日このブロックにタスクはありません"),
        bt.map(task=>React.createElement(TaskRow,{key:task.id,task,isActive:task.id===activeId,onStart:()=>startTask(task.id),onComplete:()=>completeTask(task.id),onSkip:()=>skipTask(task.id),onUndo:()=>undoTask(task.id)})),
        sk.length>0&&React.createElement("div",{style:{marginTop:12,paddingTop:8,borderTop:"0.5px solid var(--color-border-tertiary)"}},
          React.createElement("div",{style:{fontSize:11,color:"var(--color-text-tertiary)",marginBottom:4}},`スキップ (${sk.length})`),
          sk.map(task=>React.createElement("div",{key:task.id,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"3px 0"}},
            React.createElement("span",{style:{fontSize:11,color:"var(--color-text-tertiary)",textDecoration:"line-through"}},task.title),
            React.createElement("button",{onClick:()=>undoTask(task.id),style:{background:"transparent",color:"var(--color-text-tertiary)",border:"none",fontSize:13,cursor:"pointer",padding:"2px 6px"}},"戻す")
          ))
        )
      );
    })()
  );
}

function TaskRow({task,isActive,onStart,onComplete,onSkip,onUndo}){
  const cc=CAT_COLOR[task.cat]||CAT_COLOR["その他"];
  if(task.done&&!task.skipped){
    return React.createElement("div",{style:{display:"flex",alignItems:"center",gap:10,background:"var(--color-background-secondary)",borderRadius:8,padding:"8px 12px",marginBottom:4,border:"0.5px solid var(--color-border-tertiary)",opacity:0.55}},
      React.createElement("div",{style:{width:7,height:7,borderRadius:"50%",flexShrink:0,background:cc}}),
      React.createElement("div",{style:{flex:1,minWidth:0}},
        React.createElement("span",{style:{fontSize:12,color:"var(--color-text-secondary)",textDecoration:"line-through",wordBreak:"break-all"}},task.title),
        task.startTime&&React.createElement("span",{style:{fontSize:10,color:"var(--color-text-tertiary)",marginLeft:8}},`${timeStr(task.startTime)}〜${timeStr(task.endTime)}`)
      ),
      React.createElement("button",{onClick:onUndo,style:{background:"transparent",color:"var(--color-text-tertiary)",border:"none",fontSize:13,cursor:"pointer",padding:"2px 6px"}},"↩")
    );
  }
  return React.createElement("div",{style:{display:"flex",alignItems:"center",gap:10,background:isActive?"var(--color-background-info)":"var(--color-background-secondary)",borderRadius:8,padding:"10px 12px",marginBottom:6,border:`0.5px solid ${isActive?"var(--color-border-info)":"var(--color-border-tertiary)"}`}},
    React.createElement("div",{style:{width:7,height:7,borderRadius:"50%",flexShrink:0,background:cc}}),
    React.createElement("div",{style:{flex:1,minWidth:0}},
      React.createElement("div",{style:{fontSize:13,color:"var(--color-text-primary)",lineHeight:1.4,wordBreak:"break-all"}},task.title),
      React.createElement("div",{style:{display:"flex",gap:6,marginTop:4,flexWrap:"wrap"}},
        React.createElement("span",{style:{fontSize:10,color:"var(--color-text-tertiary)",background:"var(--color-background-tertiary)",borderRadius:4,padding:"1px 5px"}},task.cat),
        React.createElement("span",{style:{fontSize:10,color:"var(--color-text-tertiary)",background:"var(--color-background-tertiary)",borderRadius:4,padding:"1px 5px"}},`${task.est}分`),
        isActive&&task.startTime&&React.createElement("span",{style:{fontSize:10,color:"var(--color-text-info)",background:"var(--color-background-info)",borderRadius:4,padding:"1px 5px"}},`実行中 ${timeStr(task.startTime)}〜`)
      )
    ),
    React.createElement("div",{style:{display:"flex",gap:6,flexShrink:0}},
      !isActive&&React.createElement("button",{onClick:onStart,style:{background:"var(--color-text-info)",color:"var(--color-background-primary)",border:"none",borderRadius:6,padding:"5px 10px",fontSize:13,cursor:"pointer",fontWeight:500}},"▶"),
      isActive&&React.createElement("button",{onClick:onComplete,style:{background:"#34d399",color:"#0f172a",border:"none",borderRadius:6,padding:"5px 10px",fontSize:13,cursor:"pointer",fontWeight:500}},"✓"),
      React.createElement("button",{onClick:onSkip,style:{background:"transparent",color:"var(--color-text-tertiary)",border:"0.5px solid var(--color-border-tertiary)",borderRadius:6,padding:"5px 8px",fontSize:13,cursor:"pointer"}},"—")
    )
  );
}
ReactDOM.render(React.createElement(App),document.getElementById("sg-root"));
</script>
</body>
</html>
